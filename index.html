<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hama IT Translator </title>
 <link rel="icon" href="images.ico">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    /* Dark Mode (Default) */
    --primary: #00c3ff;
    --accent: #7fffd4;
    --bg: #05080a;
    --card-bg: rgba(255, 255, 255, 0.06);
    --text: #ffffff;
    --input-bg: rgba(0, 0, 0, 0.4);
    --border: rgba(255, 255, 255, 0.1);
}

/* Light Mode Styles */
[data-theme="light"] {
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --input-bg: #f9f9f9;
    --border: #d1d1d1;
    --primary: #007bff;
    --accent: #0056b3;
}

*{margin:0;padding:0;box-sizing:border-box; font-family: 'Noto Sans Arabic', sans-serif;}

body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.4s, color 0.4s;
    display: flex;
    flex-direction: column;
}

#bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
}

/* Theme Toggle Button */
.theme-switch {
    position: absolute;
    top: 20px;
    left: 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 100;
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.header { text-align: center; padding: 50px 15px 20px; }
.header h1 {
    font-size: clamp(24px, 7vw, 34px);
    background: linear-gradient(45deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
}

.container { width: 94%; max-width: 650px; margin: 0 auto; }

.card, .box {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 20px;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}

textarea {
    width: 100%; height: 150px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 20px;
    padding: 15px;
    text-align: right;
    resize: none;
    outline: none;
}

.btn-group { display: flex; gap: 10px; margin-top: 15px; }
button.main-btn {
    flex: 1; padding: 15px; border: none; border-radius: 12px;
    font-weight: bold; cursor: pointer; transition: 0.3s;
}
.translate { background: var(--primary); color: #fff; }
.clear { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.2); }

.label { display: block; font-size: 12px; color: var(--primary); margin-bottom: 12px; font-weight: bold; }
.output { font-size: 22px; line-height: 1.5; min-height: 40px; text-align: right; }
.en-output { text-align: left; direction: ltr; }

.copy-btn {
    position: absolute; top: 18px; left: 18px;
    background: var(--input-bg); border: 1px solid var(--border);
    color: var(--primary); padding: 6px 12px; border-radius: 8px;
    font-size: 10px; cursor: pointer; font-weight: bold;
}

.footer { text-align: center; padding: 25px; opacity: 0.6; font-size: 11px; margin-top: auto; }

.loading {
    width: 25px; height: 25px; border: 3px solid rgba(0, 195, 255, 0.1);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<canvas id="bg-canvas"></canvas>

<button class="theme-switch" id="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="header">
    <h1>وەرگێڕی Hama IT</h1>
</div>

<div class="container">
    <div class="card">
        <span class="label">دەقی کوردی</span>
        <textarea id="input" placeholder="لێرە بنووسە..."></textarea>
        <div class="btn-group">
            <button class="main-btn translate" onclick="run()">وەرگێڕان</button>
            <button class="main-btn clear" onclick="clearAll()">سڕینەوە</button>
        </div>
    </div>

    <div class="box">
        <button class="copy-btn" onclick="copyText('ar', this)">COPY</button>
        <span class="label">عەرەبی (Arabic)</span>
        <div id="ar" class="output"></div>
    </div>

    <div class="box">
        <button class="copy-btn" onclick="copyText('fa', this)">COPY</button>
        <span class="label">فارسی (Persian)</span>
        <div id="fa" class="output"></div>
    </div>

    <div class="box">
        <button class="copy-btn" onclick="copyText('en', this)" style="left: auto; right: 18px;">COPY</button>
        <span class="label" style="text-align: left; direction: ltr;">ENGLISH (ئینگلیزی)</span>
        <div id="en" class="output en-output"></div>
    </div>
</div>

<div class="footer">
    DEVELOPED BY HAMA IT © 2026
</div>

<script>
// --- Theme Logic ---
function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('theme-btn');
    if (body.getAttribute('data-theme') === 'light') {
        body.removeAttribute('data-theme');
        btn.innerText = "🌙";
        initParticles('#00c3ff'); // باگراوندەکە شین بێتەوە
    } else {
        body.setAttribute('data-theme', 'light');
        btn.innerText = "☀️";
        initParticles('#007bff'); // باگراوندەکە کەمێک تۆختر بێت بۆ بینین
    }
}

// --- 3D Background ---
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
const chars = ['ڕ', 'ڵ', 'ۆ', 'ێ', 'گ', 'چ', 'پ', 'ژ', 'ڤ'];
let particleColor = '#00c3ff';

function initCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function initParticles(color) {
    particleColor = color;
    particles = [];
    for(let i=0; i<60; i++) particles.push(new Particle());
}

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.z = Math.random() * canvas.width;
        this.char = chars[Math.floor(Math.random() * chars.length)];
    }
    update() {
        this.z -= 1.8;
        if(this.z <= 0) this.reset();
    }
    draw() {
        let x = (this.x - canvas.width/2) * (canvas.width/this.z) + canvas.width/2;
        let y = (this.y - canvas.height/2) * (canvas.width/this.z) + canvas.height/2;
        let s = 18 * (canvas.width/this.z);
        let alpha = 1 - (this.z / canvas.width);
        ctx.fillStyle = particleColor + Math.floor(alpha * 40).toString(16); // شەفافیەت
        ctx.font = `${s}px 'Noto Sans Arabic'`;
        ctx.fillText(this.char, x, y);
    }
}

function animate() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}

window.addEventListener('resize', initCanvas);
initCanvas(); initParticles('#00c3ff'); animate();

// --- Translation Logic ---
async function fetchTranslate(text, targetLang) {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ckb&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
    try {
        const response = await fetch(url);
        const data = await response.json();
        return data[0].map(item => item[0]).join('');
    } catch { return "Error Connection"; }
}

async function run(){
    const text = document.getElementById("input").value.trim();
    if(!text) return;
    const loader = '<div class="loading"></div>';
    ar.innerHTML = fa.innerHTML = en.innerHTML = loader;
    const [arRes, faRes, enRes] = await Promise.all([
        fetchTranslate(text, "ar"), fetchTranslate(text, "fa"), fetchTranslate(text, "en")
    ]);
    ar.innerText = arRes; fa.innerText = faRes; en.innerText = enRes;
}

function clearAll(){
    input.value = ""; ar.innerText = fa.innerText = en.innerText = "";
}

function copyText(id, btn) {
    const content = document.getElementById(id).innerText;
    if(content) {
        navigator.clipboard.writeText(content);
        const oldText = btn.innerText; btn.innerText = "COPIED!";
        setTimeout(() => btn.innerText = oldText, 1200);
    }
}
</script>

</body>
</html>
